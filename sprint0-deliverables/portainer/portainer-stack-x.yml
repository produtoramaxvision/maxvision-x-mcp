version: "3.9"
name: maxvision-x-mcp

services:
  mcp:
    image: ghcr.io/produtoramaxvision/maxvision-x-mcp:${MCP_VERSION}
    environment:
      NODE_ENV: production
      MCP_PORT: 3000
      MCP_TRANSPORT: http
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY}
      MCP_API_KEYS: ${MCP_API_KEYS}
      XAI_API_KEY: ${XAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      X_API_BEARER_TOKEN: ${X_API_BEARER_TOKEN}
      APIFY_API_TOKEN: ${APIFY_API_TOKEN}
      LLM_PROVIDER: ${LLM_PROVIDER:-grok}
      LICENSE_CHECK_ENABLED: ${LICENSE_CHECK_ENABLED:-true}
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-https://x-license.produtoramaxvision.com.br}
      ENABLE_WEBHOOKS: ${ENABLE_WEBHOOKS:-true}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      PATCHRIGHT_HEADLESS: "true"
    volumes:
      - profile-data:/data/profiles
      - mcp-logs:/var/log/mcp
    networks:
      - traefik-public
      - mcp-internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits: { cpus: "2.0", memory: 2G }
        reservations: { cpus: "0.5", memory: 512M }
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.http.routers.x-mcp.rule=Host(`x-api.produtoramaxvision.com.br`)"
        - "traefik.http.routers.x-mcp.entrypoints=websecure"
        - "traefik.http.routers.x-mcp.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.x-mcp.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [mcp-internal]
    deploy:
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    networks: [mcp-internal]
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  postgres-data:
  redis-data:
  profile-data:
  mcp-logs:

networks:
  traefik-public:
    external: true
  mcp-internal:
    driver: overlay
