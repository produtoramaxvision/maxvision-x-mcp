name = "maxv-x-license"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Routes — bind to x-license.produtoramaxvision.com.br
routes = [
  { pattern = "x-license.produtoramaxvision.com.br/v1/*", zone_name = "produtoramaxvision.com.br" },
]

# KV namespace for license key storage. Provisioned 2026-05-14 via cloudflare-mcp.
[[kv_namespaces]]
binding = "LICENSES"
id = "1c6920100ae34f21b808d980e59373e9"

[vars]
ENVIRONMENT = "production"

# Set via `wrangler secret put STRIPE_WEBHOOK_SECRET`
# Set via `wrangler secret put STRIPE_SECRET_KEY`
# Set via `wrangler secret put ADMIN_TOKEN` for /v1/revoke
# Set via `wrangler secret put RESEND_API_KEY` (optional notification)
